name: Deploy Infra

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"

jobs:
  apply:
    runs-on: ubuntu-latest
    if: vars.DEPLOY_INFRASTRUCTURE == 'true'
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: infra

    env:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-tf-apply-devops-profile-coffee-card-app-demo
          aws-region: ap-southeast-2

      - run: |
          aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v4

      - name: Initialise Terraform
        id: init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file=prod.tfvars

