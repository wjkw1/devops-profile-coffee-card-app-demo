name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
      - "!api/README.md"

jobs:
  deploy:
    if: vars.DEPLOY_API == 'true'
    runs-on: ubuntu-24.04-arm

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-devops-profile-coffee-card-app-demo
          aws-region: ap-southeast-2

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: coffee-card-api
        run: |
          IMAGE_TAG="main-$(git rev-parse --short HEAD)-${{ github.run_id }}-${{ github.run_attempt }}"
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to Lambda
        env:
          IMAGE_URI: ${{ steps.build-push.outputs.image }}
        run: |
          aws lambda update-function-code \
            --function-name coffee-card-api-prod \
            --image-uri "$IMAGE_URI"

          aws lambda wait function-updated-v2 \
            --function-name coffee-card-api-prod
